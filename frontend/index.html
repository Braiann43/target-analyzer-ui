<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="matrix-rain"></canvas> <!-- fondo tipo hacker de las peliculas -->
    <div class="bunker-container"> <!-- la caja principal que guarda todo  -->

        <header id="consola-input"> <!-- aca va el link -->
            <label for="target-url" class="prompt-text">[TARGET_URL]:</label> <!-- el textito del costado -->
            <input type="url" id="target-url" placeholder="https://"> <!-- aca se escribe -->
            <button id="btn-scan">[INICIAR_ESCANEO]</button>
            <button id="btn-abortar">[ABORTAR]</button>
            <button id="btn-menu">[MENÚ]</button>
            <div class="panel-progreso">
                <label for="scan-progress" class="prompt-text">[PROGRESO_ESCANEO]:</label>
                <progress id="scan-progress" class="barra-tactica" value="0" max="100"></progress>
                <span class="progreso-porcentaje">0%</span>
            </div>
        </header>

        <main class="paneles-grid"> <!-- la grilla para que quede todo ordenadito -->

            <!-- uso la clase panel-bunker para no escribir mil veces lo mismo en el css xd -->

            <section class="panel-bunker" id="panel-vista">   
                <h2 class="panel-titulo">PANEL 1: [VISTA]</h2>   
                <div class="contenido-panel esperando"></div>
                <!-- aca va la foto de la pagina -->
            </section>

            <section class="panel-bunker" id="panel-tech">
                <h2 class="panel-titulo">PANEL 2: [TECNOLOGÍAS]</h2>
                <div class="contenido-panel esperando"></div>
                <!-- aca tira con que hicieron la pagina (ni idea como funciona nodejs) -->
            </section>

            <section class="panel-bunker" id="panel-enlaces">
                <h2 class="panel-titulo">PANEL 3: [ENLACES]</h2>
                <div class="contenido-panel scroll-activo esperando"></div>
                <!-- aca van los links. le meti scroll porque a veces son como 500 y se rompia toda la pagina -->
            </section>

            <section class="panel-bunker" id="panel-metricas">
                <h2 class="panel-titulo">PANEL 4: [MÉTRICAS]</h2>
                <div class="contenido-panel esperando"></div>
                <!-- aca van los datos esos de peso y tiempo de carga -->
            </section>

        </main> 
        
        <!-- el menu del costado que esta escondido -->
        <div>
            <aside id="menu-lateral">
        <div class="menu-header">
            <h2 class="panel-titulo">[PANEL DE CONTROL]</h2>
            <button id="btn-cerrar-menu">[X]</button>
        </div>
        
        <div class="menu-seccion">
            <h3>[TEMA VISUAL]</h3>
            <div class="color-picker-marco">
                <input type="color" id="color-picker-menu" value="#00ff41" title="Elegí el color del tema">
            </div>
        </div>

        <div class="menu-seccion scroll-activo" style="flex-grow: 1;">
            <h3>[HISTORIAL DE BÚSQUEDAS]</h3>
            <ul id="lista-historial">
                <li style="color: var(--color-terminal); opacity: 0.5;">[HISTORIAL VACÍO]</li>
            </ul>
        </div>
    </aside>
        </div>

    </div>
    <script src="matrix.js"></script>
    <script src="script.js"></script>
</body>
</html>
