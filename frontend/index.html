<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="matrix-rain"></canvas> <!-- fondoooo animado de la pagina (lluvia de carecteres estilo matrix) -->
    <div class="bunker-container"> <!-- Envuelve toda la aplicacion, sirve para (centrado, fondo, margin, etc)-->

        <header id="consola-input"> <!-- Es la barra de control donde el usuario ingresa la URL -->
            <label for="target-url" class="prompt-text">[TARGET_URL]:</label> <!-- Etiqueta descriptiva del campo de texto -->
            <input type="url" id="target-url" placeholder="https://"> <!-- Input para ingresar la URL del objetivo -->
            <button id="btn-scan">[INICIAR_ESCANEO]</button>
            <button id="btn-abortar">[ABORTAR]</button>
            <button id="btn-menu">[MENÚ]</button>
            <div class="panel-progreso">
                <label for="scan-progress" class="prompt-text">[PROGRESO_ESCANEO]:</label>
                <progress id="scan-progress" class="barra-tactica" value="0" max="100"></progress>
                <span class="progreso-porcentaje">0%</span>
            </div>
        </header>

        <main class="paneles-grid"> <!-- Contenedor principal que organiza los paneles en una cuadrícula -->

            <!-- Aca utilizamos la clase "panel-bunker" para aplicar estilos comunes a todos los paneles, y cada panel tiene un ID unico para su contenido especifico, y la class "contenido-panel" para el contenido interno, que se presentara desde JavaScript -->

            <!-- Cada panel-titulo ahora lleva, ademas del texto, un SVG "tactico" (trazo fino, sin relleno) que
                 usa stroke="currentColor": asi el icono siempre hereda el verde neon del tema, incluso si el
                 usuario lo cambia en vivo desde el selector de color del menu lateral. Cero imagenes externas,
                 cero peso extra: son vectores dibujados a mano, como el resto de la estetica bunker -->

            <section class="panel-bunker" id="panel-vista">
                <h2 class="panel-titulo">
                    <svg class="icono-panel" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                        <!-- Icono de mira/reticula: representa la "vista" u ojo del objetivo -->
                        <circle cx="12" cy="12" r="8"></circle>
                        <circle cx="12" cy="12" r="2.2"></circle>
                        <line x1="12" y1="1" x2="12" y2="5"></line>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="1" y1="12" x2="5" y2="12"></line>
                        <line x1="19" y1="12" x2="23" y2="12"></line>
                    </svg>
                    PANEL 1: [VISTA]
                </h2>
                <div class="contenido-panel scroll-activo esperando"></div>
                <!-- Aca se mostrara la vista/screenshot de la web scrapeada -->
            </section>

            <section class="panel-bunker" id="panel-tech">
                <h2 class="panel-titulo">
                    <svg class="icono-panel" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                        <!-- Icono de chip/circuito: representa las tecnologias detectadas -->
                        <rect x="7" y="7" width="10" height="10" rx="1"></rect>
                        <rect x="10" y="10" width="4" height="4"></rect>
                        <line x1="12" y1="1" x2="12" y2="4"></line>
                        <line x1="12" y1="20" x2="12" y2="23"></line>
                        <line x1="1" y1="12" x2="4" y2="12"></line>
                        <line x1="20" y1="12" x2="23" y2="12"></line>
                        <line x1="4.5" y1="4.5" x2="6.5" y2="6.5"></line>
                        <line x1="17.5" y1="17.5" x2="19.5" y2="19.5"></line>
                        <line x1="19.5" y1="4.5" x2="17.5" y2="6.5"></line>
                        <line x1="6.5" y1="17.5" x2="4.5" y2="19.5"></line>
                    </svg>
                    PANEL 2: [TECNOLOGÍAS]
                </h2>
                <div class="contenido-panel scroll-activo esperando"></div>
                <!-- Aca se mostraran las tecnologias detectadas en la web objetivo (frameworks, librerías, servidor, etc) Una vez que Node.js analice los headers y el HTML -->
            </section>

            <section class="panel-bunker" id="panel-enlaces">
                <h2 class="panel-titulo">
                    <svg class="icono-panel" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                        <!-- Icono de cadena/eslabones: representa los enlaces encontrados -->
                        <rect x="2" y="9" width="9" height="6" rx="3"></rect>
                        <rect x="13" y="9" width="9" height="6" rx="3"></rect>
                        <line x1="9" y1="12" x2="15" y2="12"></line>
                    </svg>
                    PANEL 3: [ENLACES]
                </h2>
                <div class="contenido-panel scroll-activo esperando"></div>
                <!-- Aca se mostraran los enlaces encontrados en la web objetivo, solo que con un scroll activo para manejar grandes cantidades de enlaces -->
            </section>

            <section class="panel-bunker" id="panel-metricas">
                <h2 class="panel-titulo">
                    <svg class="icono-panel" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                        <!-- Icono de radar/barras: representa las metricas del escaneo -->
                        <line x1="4" y1="21" x2="4" y2="13"></line>
                        <line x1="12" y1="21" x2="12" y2="7"></line>
                        <line x1="20" y1="21" x2="20" y2="17"></line>
                        <line x1="2" y1="21" x2="22" y2="21"></line>
                    </svg>
                    PANEL 4: [MÉTRICAS]
                </h2>
                <div class="contenido-panel scroll-activo esperando"></div>
                <!-- Aca se mostraran las metricas (cantidad de imagenes, peso de la pagina, tiempo de carga, cantidad de scripts, etc) -->
            </section>

        </main> <!-- Menu Lateral-->
        <div>
            <aside id="menu-lateral">
        <div class="menu-header">
            <h2 class="panel-titulo">[PANEL DE CONTROL]</h2>
            <button id="btn-cerrar-menu">[X]</button>
        </div>
        
        <div class="menu-seccion">
            <h3>[TEMA VISUAL]</h3>
            <div class="color-picker-marco">
                <input type="color" id="color-picker-menu" value="#00ff41" title="Elegí el color del tema">
            </div>
        </div>

        <div class="menu-seccion">
            <h3>[TAMAÑO DE FUENTE]</h3>
            <div class="selector-fuente" id="selector-fuente">
                <button class="btn-fuente" data-tamano="0.85rem" title="Chica">S</button>
                <button class="btn-fuente" data-tamano="1rem" title="Normal">M</button>
                <button class="btn-fuente" data-tamano="1.15rem" title="Grande">L</button>
                <button class="btn-fuente" data-tamano="1.35rem" title="Enorme">XL</button>
            </div>
        </div>

        <div class="menu-seccion">
            <h3>[ESTILO DE FUENTE]</h3>
            <div class="selector-fuente" id="selector-tipografia">
                <button class="btn-fuente btn-tipografia" data-fuente="'Courier New', Courier, monospace" title="Máquina de escribir clásica">MONO</button>
                <button class="btn-fuente btn-tipografia" data-fuente="Consolas, Monaco, monospace" title="Estilo consola moderna">CONSOLA</button>
                <button class="btn-fuente btn-tipografia" data-fuente="Georgia, 'Times New Roman', serif" title="Estilo elegante con serifas">SERIF</button>
                <button class="btn-fuente btn-tipografia" data-fuente="Arial, Helvetica, sans-serif" title="Estilo limpio y moderno">SANS</button>
            </div>
        </div>

        <div class="menu-seccion scroll-activo" style="flex-grow: 1;">
            <h3>[HISTORIAL DE BÚSQUEDAS]</h3>
            <ul id="lista-historial">
                <li style="color: var(--color-terminal); opacity: 0.5;">[HISTORIAL VACÍO]</li>
            </ul>
        </div>
    </aside>
        </div>

    </div>
    <script src="matrix.js"></script>
    <script src="script.js"></script>
</body> 
</html>
